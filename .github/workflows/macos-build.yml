name: macOS Build

# Manual on-demand builds only — no automatic CI triggers.
on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version
        required: false
        default: "3.12"
        type: choice
        options:
          - "3.11"
          - "3.12"
          - "3.13"
      build_macos_app:
        description: Build JUCE Theme Studio .app and DMG
        required: false
        default: true
        type: boolean
      build_juce_preview:
        description: Build JUCE Live Preview .app and DMG
        required: false
        default: true
        type: boolean
      juce_ref:
        description: JUCE git ref (branch or tag)
        required: false
        default: 8.0.6
        type: string

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: juce_theme_studio/pyproject.toml

      - name: Install Python dependencies
        working-directory: juce_theme_studio
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: Run tests
        working-directory: juce_theme_studio
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -p pytest

      # ── JUCE Theme Studio ──────────────────────────────────────────────────

      - name: Build JUCE Theme Studio .app and DMG
        if: inputs.build_macos_app
        working-directory: juce_theme_studio
        run: bash packaging/build_macos_app.sh
        # Produces: dist/JUCE Theme Studio.app
        #           dist/JUCE_Theme_Studio_<version>.dmg

      - name: Upload JUCE Theme Studio DMG
        if: inputs.build_macos_app
        uses: actions/upload-artifact@v4
        with:
          name: JUCE-Theme-Studio-macOS
          path: juce_theme_studio/dist/JUCE_Theme_Studio_*.dmg
          if-no-files-found: error

      # ── Python wheel (for developers) ─────────────────────────────────────

      - name: Build Python wheel
        working-directory: juce_theme_studio
        run: |
          pip install build
          python -m build --wheel
          ls -la dist/

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-macos
          path: juce_theme_studio/dist/*.whl
          if-no-files-found: error

      # ── JUCE Live Preview ──────────────────────────────────────────────────

      - name: Clone JUCE
        if: inputs.build_juce_preview
        run: |
          git clone --depth 1 --branch "${{ inputs.juce_ref }}" \
            https://github.com/juce-framework/JUCE.git "${{ runner.temp }}/JUCE"

      - name: Build JUCE Live Preview
        if: inputs.build_juce_preview
        working-directory: juce_theme_studio/examples/juce_live_preview
        run: |
          rm -rf build
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR="${{ runner.temp }}/JUCE"
          cmake --build build --config Release
          find build -maxdepth 5 -type d -name '*.app' -print

      - name: Package JUCE Live Preview DMG
        if: inputs.build_juce_preview
        working-directory: juce_theme_studio/examples/juce_live_preview
        run: |
          APP_PATH="$(find build -maxdepth 5 -type d -name '*.app' | head -1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: no .app bundle found under build/" >&2
            find build -maxdepth 6 -print >&2
            exit 1
          fi
          echo "Packaging: $APP_PATH"

          STAGING="$(mktemp -d)"
          cp -r "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -srcfolder "$STAGING" \
            -volname "JUCE Live Preview 1.0.0" \
            -fs HFS+ \
            -format UDZO \
            -ov \
            "${{ runner.temp }}/JuceLivePreview_1.0.0.dmg"

          rm -rf "$STAGING"
          ls -la "${{ runner.temp }}/"

      - name: Upload JUCE Live Preview DMG
        if: inputs.build_juce_preview
        uses: actions/upload-artifact@v4
        with:
          name: JUCE-Live-Preview-macOS
          path: ${{ runner.temp }}/JuceLivePreview_1.0.0.dmg
          if-no-files-found: error
