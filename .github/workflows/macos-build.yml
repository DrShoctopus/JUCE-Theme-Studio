name: macOS Build

# Manual on-demand builds only — no automatic CI triggers.
on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version
        required: false
        default: "3.12"
        type: choice
        options:
          - "3.11"
          - "3.12"
          - "3.13"
      build_macos_app:
        description: Build JUCE Theme Studio.app (double-clickable Mac app)
        required: false
        default: true
        type: boolean
      build_juce_preview:
        description: Build JUCE Live Preview companion app
        required: false
        default: true
        type: boolean
      juce_ref:
        description: JUCE git ref (branch or tag)
        required: false
        default: 8.0.6
        type: string

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: juce_theme_studio/pyproject.toml

      - name: Install Python dependencies
        working-directory: juce_theme_studio
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: Run tests
        working-directory: juce_theme_studio
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -p pytest

      - name: Build JUCE Theme Studio.app
        if: inputs.build_macos_app
        working-directory: juce_theme_studio
        run: bash packaging/build_macos_app.sh

      - name: Package JUCE Theme Studio.app
        if: inputs.build_macos_app
        working-directory: juce_theme_studio
        run: |
          mkdir -p "${{ runner.temp }}/release"
          cp packaging/README-MACOS.txt "${{ runner.temp }}/release/"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/JUCE Theme Studio.app" \
            "${{ runner.temp }}/release/JUCE-Theme-Studio-macOS.zip"
          ls -la "${{ runner.temp }}/release/"

      - name: Build Python wheel (developers)
        working-directory: juce_theme_studio
        run: |
          pip install build
          python -m build --wheel
          ls -la dist/

      - name: Clone JUCE
        if: inputs.build_juce_preview
        run: |
          git clone --depth 1 --branch "${{ inputs.juce_ref }}" \
            https://github.com/juce-framework/JUCE.git "${{ runner.temp }}/JUCE"

      - name: Build JUCE Live Preview
        if: inputs.build_juce_preview
        working-directory: juce_theme_studio/examples/juce_live_preview
        run: |
          rm -rf build
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR="${{ runner.temp }}/JUCE"
          cmake --build build --config Release
          find build -type d -name '*.app' -maxdepth 5 -print

      - name: Package JUCE Live Preview.app
        if: inputs.build_juce_preview
        working-directory: juce_theme_studio/examples/juce_live_preview
        run: |
          mkdir -p "${{ runner.temp }}/release"
          APP_PATH="$(find build -type d -name '*.app' -maxdepth 5 | head -1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "No .app bundle found under build/" >&2
            find build -maxdepth 6 -print >&2
            exit 1
          fi
          echo "Packaging $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "${{ runner.temp }}/release/JUCE-Live-Preview-macOS.zip"
          ls -la "${{ runner.temp }}/release/"

      - name: Upload JUCE Theme Studio.app
        if: inputs.build_macos_app
        uses: actions/upload-artifact@v4
        with:
          name: JUCE-Theme-Studio-macOS
          path: ${{ runner.temp }}/release/JUCE-Theme-Studio-macOS.zip
          if-no-files-found: error

      - name: Upload JUCE Live Preview.app
        if: inputs.build_juce_preview
        uses: actions/upload-artifact@v4
        with:
          name: JUCE-Live-Preview-macOS
          path: ${{ runner.temp }}/release/JUCE-Live-Preview-macOS.zip
          if-no-files-found: error

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-macos
          path: juce_theme_studio/dist/*.whl
          if-no-files-found: error
